name: Generate Packs

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp beautifulsoup4 PyQt5

      - name: Generate packs
        run: python tools/generate_packs.py

      - name: Commit and push changes
        run: |
          if [ -z "$(git status --porcelain packs)" ]; then
            echo "Nessun pack da aggiornare"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packs

          if git diff --cached --quiet; then
            echo "Nessuna differenza da committare"
            exit 0
          fi

          git commit -m "Update packs"
          git push
